name: Validate Badges

on:
  pull_request:
    branches: [main]
    paths:
      - "public/assets/certificates/**"

jobs:
  validate:
    name: Validate SVG Badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Nano Courses ──────────────────────────────────────────────────────────

      - name: "[Nano] Check folder structure"
        run: |
          for theme in light dark black; do
            dir="public/assets/certificates/nano/$theme"
            test -d "$dir" || { echo "❌ Missing directory: $dir"; exit 1; }
          done
          echo "✅ Nano folder structure OK"

      - name: "[Nano] Check badge parity across themes"
        run: |
          LIGHT=$(find public/assets/certificates/nano/light -type f -name "*.svg" | xargs -n1 basename | sort)
          DARK=$(find  public/assets/certificates/nano/dark  -type f -name "*.svg" | xargs -n1 basename | sort)
          BLACK=$(find public/assets/certificates/nano/black -type f -name "*.svg" | xargs -n1 basename | sort)

          FAILED=0

          diff_themes() {
            local ref="$1" cmp="$2" ref_name="$3" cmp_name="$4"
            local missing extra
            missing=$(comm -23 <(echo "$ref") <(echo "$cmp"))
            extra=$(comm -13 <(echo "$ref") <(echo "$cmp"))
            if [ -n "$missing" ]; then
              echo "❌ In '$ref_name' but missing in '$cmp_name':"; echo "$missing"; FAILED=1
            fi
            if [ -n "$extra" ]; then
              echo "❌ In '$cmp_name' but missing in '$ref_name':"; echo "$extra"; FAILED=1
            fi
          }

          diff_themes "$LIGHT" "$DARK"  "light" "dark"
          diff_themes "$LIGHT" "$BLACK" "light" "black"

          [ "$FAILED" -eq 0 ] && echo "✅ Nano theme parity OK" || exit 1

      - name: "[Nano] Check for duplicate IDs"
        run: |
          FAILED=0
          for theme in light dark black; do
            DUPES=$(find public/assets/certificates/nano/$theme -type f -name "*.svg" \
              | xargs -n1 basename | sed 's/\.svg//' | sort | uniq -d)
            if [ -n "$DUPES" ]; then
              echo "❌ Duplicate IDs in 'nano/$theme':"; echo "$DUPES"; FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] && echo "✅ Nano IDs unique OK" || exit 1

      # ── Challenge ─────────────────────────────────────────────────────────────

      - name: "[Challenge] Check structure and ranking completeness"
        run: |
          FAILED=0
          # Each company must have rankings 1.svg, 2.svg, 3.svg in every theme
          for year_dir in public/assets/certificates/challenge/*/; do
            year=$(basename "$year_dir")
            for company_dir in "$year_dir"*/; do
              company=$(basename "$company_dir")
              for theme in light dark black; do
                theme_dir="$company_dir$theme"
                if [ ! -d "$theme_dir" ]; then
                  echo "❌ Missing: challenge/$year/$company/$theme/"; FAILED=1; continue
                fi
                for ranking in 1 2 3; do
                  svg="$theme_dir/$ranking.svg"
                  if [ ! -f "$svg" ]; then
                    echo "❌ Missing ranking SVG: $svg"; FAILED=1
                  fi
                done
              done
            done
          done
          [ "$FAILED" -eq 0 ] && echo "✅ Challenge structure OK" || exit 1

      # ── Global Solution ───────────────────────────────────────────────────────

      - name: "[Global Solution] Check structure"
        run: |
          FAILED=0
          # Each topic must have 1.svg in every theme
          for year_dir in public/assets/certificates/gs/*/; do
            year=$(basename "$year_dir")
            for topic_dir in "$year_dir"*/; do
              topic=$(basename "$topic_dir")
              for theme in light dark black; do
                svg="$topic_dir$theme/1.svg"
                if [ ! -f "$svg" ]; then
                  echo "❌ Missing: gs/$year/$topic/$theme/1.svg"; FAILED=1
                fi
              done
            done
          done
          [ "$FAILED" -eq 0 ] && echo "✅ Global Solution structure OK" || exit 1

      # ── SVG Content ───────────────────────────────────────────────────────────

      - name: "Validate SVG content (non-empty, well-formed, size)"
        run: |
          FAILED=0
          while IFS= read -r file; do
            if [ ! -s "$file" ]; then
              echo "❌ Empty file: $file"; FAILED=1; continue
            fi
            if ! grep -q "<svg" "$file"; then
              echo "❌ Not a valid SVG: $file"; FAILED=1; continue
            fi
            size=$(stat -c%s "$file")
            if [ "$size" -gt 307200 ]; then
              echo "❌ SVG exceeds 300 KB (${size} bytes): $file"; FAILED=1
            fi
          done < <(find public/assets/certificates -type f -name "*.svg")
          [ "$FAILED" -eq 0 ] && echo "✅ All SVGs valid and within size limit" || exit 1
