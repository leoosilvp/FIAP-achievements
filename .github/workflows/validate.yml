name: Validate Badges

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate folder structure
        run: |
          test -d public/assets/svg/light  || { echo "Missing: light/"; exit 1; }
          test -d public/assets/svg/dark   || { echo "Missing: dark/";  exit 1; }
          test -d public/assets/svg/black  || { echo "Missing: black/"; exit 1; }

      - name: Validate SVG files exist
        run: |
          COUNT=$(find public/assets/svg -type f -name "*.svg" | wc -l)
          echo "Total SVGs found: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No SVG files found."
            exit 1
          fi

      - name: Validate SVG content (not empty or malformed)
        run: |
          FAILED=0
          while IFS= read -r file; do
            if [ ! -s "$file" ]; then
              echo "Empty file: $file"
              FAILED=1
              continue
            fi
            if ! grep -q "<svg" "$file"; then
              echo "Not a valid SVG: $file"
              FAILED=1
            fi
          done < <(find public/assets/svg -type f -name "*.svg")
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Check for duplicate IDs within each theme
        run: |
          FAILED=0
          for theme in light dark black; do
            echo "Checking theme: $theme"
            DUPLICATES=$(find public/assets/svg/$theme -type f -name "*.svg" \
              | xargs -n 1 basename \
              | sed 's/\.svg//' \
              | sort | uniq -d)
            if [ -n "$DUPLICATES" ]; then
              echo "Duplicated IDs in '$theme':"
              echo "$DUPLICATES"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Check badge parity across themes
        run: |
          LIGHT=$(find public/assets/svg/light -type f -name "*.svg" | xargs -n1 basename | sort)
          DARK=$(find public/assets/svg/dark   -type f -name "*.svg" | xargs -n1 basename | sort)
          BLACK=$(find public/assets/svg/black -type f -name "*.svg" | xargs -n1 basename | sort)

          FAILED=0

          MISSING_DARK=$(comm -23 <(echo "$LIGHT") <(echo "$DARK"))
          if [ -n "$MISSING_DARK" ]; then
            echo "Badges in 'light' but missing in 'dark':"
            echo "$MISSING_DARK"
            FAILED=1
          fi

          MISSING_BLACK=$(comm -23 <(echo "$LIGHT") <(echo "$BLACK"))
          if [ -n "$MISSING_BLACK" ]; then
            echo "Badges in 'light' but missing in 'black':"
            echo "$MISSING_BLACK"
            FAILED=1
          fi

          EXTRA_DARK=$(comm -13 <(echo "$LIGHT") <(echo "$DARK"))
          if [ -n "$EXTRA_DARK" ]; then
            echo "Badges in 'dark' but missing in 'light':"
            echo "$EXTRA_DARK"
            FAILED=1
          fi

          EXTRA_BLACK=$(comm -13 <(echo "$LIGHT") <(echo "$BLACK"))
          if [ -n "$EXTRA_BLACK" ]; then
            echo "Badges in 'black' but missing in 'light':"
            echo "$EXTRA_BLACK"
            FAILED=1
          fi

          [ "$FAILED" -eq 0 ] || exit 1

      - name: Validate SVG file size
        run: |
          FAILED=0
          while IFS= read -r file; do
            echo "Large SVG (>300KB): $file"
            FAILED=1
          done < <(find public/assets/svg -type f -name "*.svg" -size +300k)
          [ "$FAILED" -eq 0 ] || exit 1